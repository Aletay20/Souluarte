backend:
  name: git-gateway
  branch: main  # or 'master' if that's your default branch

media_folder: "uploads"   # Folder for storing images
public_folder: "/uploads" # Public path for images

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "index"
        file: "index.html"  # Path to your homepage file
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
