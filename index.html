<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Maintenance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      text-align: center;
      padding: 50px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }
    h1 {
      font-size: 36px;
      color: #e74c3c;
    }
    p {
      font-size: 18px;
      margin: 20px 0;
    }
    .email-signup {
      margin-top: 20px;
    }
    input[type="email"] {
      padding: 10px;
      font-size: 16px;
      width: 100%;
      max-width: 300px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      background-color: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>We'll Be Back Soon!</h1>
    <p>We are currently performing some maintenance on our site. Please check back later.</p>
    <p>We apologize for the inconvenience. Thank you for your patience!</p>

    <!-- Optional: Email Signup Form -->
    <div class="email-signup">
      <p>Want to be notified when we launch?</p>
      <form action="your-email-service-url" method="POST">
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit">Notify Me</button>
      </form>
    </div>
  </div>
</body>
</html>
